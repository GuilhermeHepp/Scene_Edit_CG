<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Editor - WebGL</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://greggman.github.io/webgl-lint/webgl-lint.js"></script>
  </head>
  <body>
    <div id="transformations-menu">
      <h3>Properties</h3>

      <h4>Position</h4>
      <label>X: <input type="number" id="posX" value="0" step="0.5" /></label>
      <label>Y: <input type="number" id="posY" value="0" step="0.5" /></label>
      <label>Z: <input type="number" id="posZ" value="0" step="0.5" /></label>

      <h4>Rotation</h4>
      <label
        >Y (Degrees): <input type="number" id="rotY" value="0" step="15"
      /></label>

      <h4>Scale</h4>
      <label>X: <input type="number" id="scaleX" value="1" step="0.1" /></label>
      <label>Y: <input type="number" id="scaleY" value="1" step="0.1" /></label>
      <label>Z: <input type="number" id="scaleZ" value="1" step="0.1" /></label>

      <h4>Animation</h4>
      <label
        >Type:
        <select id="animType">
          <option value="none">None</option>
          <option value="rotateY">Spin</option>
          <option value="moveX">Move X (Ping-Pong)</option>
        </select>
      </label>
      <label
        >Speed: <input type="number" id="animSpeed" value="0" step="1"
      /></label>

      <h4>Texture</h4>
      <label
        >Select:
        <select id="texSelect">
          <option value="none">None (Solid Color)</option>
          <option value="leaves">Leaves (From Article)</option>
          <option value="star">Star (From Article)</option>
        </select>
      </label>

      <h4>Hierarchy</h4>
      <label
        >Parent Object:
        <select id="parentId">
          <option value="none">None (World)</option>
        </select>
      </label>
    </div>

    <div id="scene-container">
      <canvas id="webgl-canvas"></canvas>
    </div>

    <div id="models-menu">
      <h3>Models</h3>

      <label
        >Select Model:
        <select id="model-select"></select>
      </label>

      <div class="model-actions">
        <button id="btn-add">➕ Add Object</button>
        <button id="btn-preview" class="btn-secondary">👁️ Preview</button>
      </div>

      <h4 style="margin-top: 40px">Scene Data</h4>
      <div class="model-actions">
        <button id="btn-save">💾 Save JSON</button>
        <button id="btn-load" class="btn-secondary">📂 Load JSON</button>
        <input
          type="file"
          id="input-load"
          accept=".json"
          style="display: none"
        />
      </div>
    </div>

    <div id="preview-modal">
      <div id="preview-content">
        <h3 style="color: #333; margin-bottom: 15px">Model Preview</h3>
        <canvas id="preview-canvas" width="400" height="400"></canvas>
        <button
          id="btn-close-preview"
          class="btn-secondary"
          style="width: 100%; margin-top: 15px"
        >
          Close Preview
        </button>
      </div>
    </div>

    <script src="https://twgljs.org/dist/4.x/twgl-full.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
